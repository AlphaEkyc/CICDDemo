name: CI Build Test

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore project dependencies
        run: dotnet restore CICDdemo/CICDdemo.csproj

      - name: Build project
        run: dotnet build CICDdemo/CICDdemo.csproj --configuration Release --no-restore

      - name: Publish project
        run: dotnet publish CICDdemo/CICDdemo.csproj --configuration Release --output ./publish --no-build
